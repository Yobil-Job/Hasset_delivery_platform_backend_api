spring.application.name=kuru-delivery

spring.datasource.url=jdbc:h2:mem:testdb



spring.jpa.hibernate.ddl-auto=update
spring.jpa.defer-datasource-initialization=true

# JWT Configuration
# SECURITY: JWT secret MUST be provided via environment variable in production
# Minimum 32 characters for HS256 security
# Development default provided - MUST be changed in production via JWT_SECRET environment variable
jwt.secret=${JWT_SECRET}
# Access token expiration: 30 minutes (1800000 ms)
jwt.expiration=${JWT_EXPIRATION:1800000}
# Refresh token expiration: 7 days (604800000 ms)
jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000} 




# === Gmail SMTP Configuration ===
# SECURITY: All credentials are loaded from .env file or environment variables
# Create a .env file in the project root (see .env.example for template)
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Application mail settings
app.mail.from=${MAIL_FROM:}
app.mail.admin=${MAIL_ADMIN:}

# Redis Configuration
# SECURITY: Redis should NOT be exposed to internet - use localhost or private network only
# In production, use internal network or VPN, never expose port 6379 to public
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.password=${REDIS_PASSWORD:}
# SSL is disabled by default for local development
spring.data.redis.ssl.enabled=${REDIS_SSL_ENABLED:false}

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Application Configuration
app.upload.dir=uploads/delivery-proofs
app.base.url=http://localhost:8080

# Chapa Payment Configuration
# SECURITY: All credentials are loaded from .env file or environment variables
chapa.secret=${CHAPA_SECRET:}
chapa.public=${CHAPA_PUBLIC:}
chapa.mode=${CHAPA_MODE:SANDBOX}
chapa.base.url=${CHAPA_BASE_URL:https://api.chapa.co/v1}
payment.return.url=${PAYMENT_RETURN_URL:http://localhost:3000/payments/result}
payment.notify.url=${PAYMENT_NOTIFY_URL:http://localhost:8080/api/payments/webhook}

# Cloudinary Configuration
# SECURITY: All credentials are loaded from .env file or environment variables
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME:}
cloudinary.api.key=${CLOUDINARY_API_KEY:}
cloudinary.api.secret=${CLOUDINARY_API_SECRET:}
cloudinary.secure=true

# Actuator Security Configuration
# SECURITY: Limit exposed endpoints and require authentication
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when-authorized
management.endpoints.web.base-path=/actuator







